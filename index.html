<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Personal photography portfolio of Marcin Jaruszewicz, featuring studio fashion portraits, nature and wildlife photography, travel images, and photographs from Japan."
    />
    <title>Marcin&#039;s spot &#8211; Personal photography website featuring Marcin Jaruszewicz original images grouped into: studio fashion and portrait photography, nature and wildlife photography, travel photography, portrait photography of people, and photographs taken in Japan.</title>
    <script>
      (function () {
        var version = Date.now().toString();
        var stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "portfolio.css?v=" + version;
        document.head.appendChild(stylesheet);
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#/">Photo <span>Portfolio</span></a>
      <nav class="nav-actions" id="header-nav" aria-label="Primary"></nav>
    </header>

    <main id="app-root"></main>

    <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Full screen photo">
      <div id="lightbox-stage" class="lightbox__stage">
        <div class="lightbox__top">
          <div id="lightbox-caption" class="lightbox__caption"></div>
          <button type="button" id="lightbox-close" class="lightbox__close" aria-label="Close">
            ×
          </button>
        </div>
        <button type="button" id="lightbox-prev" class="lightbox__nav lightbox__nav--prev" aria-label="Previous photo">
          ‹
        </button>
        <div class="lightbox__photo-wrap">
          <img id="lightbox-image" class="lightbox__image" alt="" />
          <p class="lightbox__watermark" aria-hidden="true">© Marcin Jaruszewicz</p>
        </div>
        <button type="button" id="lightbox-next" class="lightbox__nav lightbox__nav--next" aria-label="Next photo">
          ›
        </button>
        <p class="lightbox__hint">Arrow keys · Click outside to close</p>
      </div>
    </div>

    <script>
      (function () {
        var version = Date.now().toString();

        function loadScript(src, onLoad) {
          var script = document.createElement("script");
          script.src = src + "?v=" + version;
          script.onload = onLoad || null;
          document.body.appendChild(script);
        }

        loadScript("gallery-data.js", function () {
          loadScript("portfolio.js");
        });
      })();
    </script>
  </body>
</html>
